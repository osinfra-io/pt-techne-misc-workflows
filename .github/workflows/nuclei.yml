name: Nuclei Vulnerability Scan Called Workflow

on:
  workflow_call:
    inputs:
      urls_file:
        description: "Path to the file containing URLs to scan with Nuclei"
        required: true
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  nuclei-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      # GitHub Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Nuclei
      # https://github.com/projectdiscovery/nuclei-action

      - name: Nuclei run
        id: nuclei_scan
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538  # v3.1.1
        with:
          args: "-list ${{ inputs.urls_file }} -severity low,medium,high,critical -H 'User-Agent: osinfra.io - Vulnerability Scan' -sarif-export nuclei.sarif"

      # GitHub Upload Artifact
      # https://github.com/actions/upload-artifact

      - name: GitHub workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nuclei-artifacts
          path: |
            nuclei.sarif

      # GitHub CodeQL upload SARIF
      # https://github.com/github/codeql-action

      - name: GitHub security dashboard alerts update
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        if: success() && hashFiles('nuclei.sarif') != ''
        with:
          sarif_file: nuclei.sarif
          category: Nuclei
