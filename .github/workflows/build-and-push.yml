name: Build and Push Called Workflow

on:
  workflow_call:
    inputs:
      build_args:
        description: "Build arguments to pass to docker build (newline-separated KEY=VALUE pairs)"
        required: false
        type: string
      cache_from:
        description: "Cache sources for Docker layer caching"
        required: true
        type: string
      cache_to:
        description: "Cache destinations for Docker layer caching"
        required: false
        type: string
        default: "type=inline"
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      file:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: ""
      push:
        description: "Whether to push the image after building"
        required: false
        type: boolean
        default: true
      registry:
        description: "Container registry hostname (e.g. us-docker.pkg.dev)"
        required: true
        type: string
      service_account:
        description: "GCP service account for Artifact Registry authentication"
        required: true
        type: string
      tags:
        description: "Image tags to apply (newline-separated)"
        required: true
        type: string
      workload_identity_provider:
        description: "GCP Workload Identity Provider for OIDC authentication"
        required: true
        type: string


permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      # Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Google Cloud Platform - Create Credentials
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Create credentials
        id: create_credentials
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          token_format: access_token
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          access_token_lifetime: 300s

      # Docker Buildx
      # https://github.com/marketplace/actions/docker-setup-buildx

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # Docker Login
      # https://github.com/marketplace/actions/docker-login

      - name: Login to Google Artifact Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.create_credentials.outputs.access_token }}

      # Build and Push Docker to Google Artifact Registry
      # https://github.com/marketplace/actions/build-and-push-docker-images

      - name: Build and push to Google Artifact Registry
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          tags: ${{ inputs.tags }}
          cache-from: ${{ inputs.cache_from }}
          cache-to: ${{ inputs.cache_to }}
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          build-args: ${{ inputs.build_args }}
          push: ${{ inputs.push }}
